<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 — ワインオークション</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans JP', sans-serif; }
    .wine-badge { background: linear-gradient(135deg, #7B2D8B, #C0392B); }
    .tab-active { background: #7C3AED; color: white; }
    .tab-inactive { background: #F3F4F6; color: #6B7280; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.2s ease; }
  </style>
</head>
<body class="bg-gray-100">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex items-center h-14 gap-3">
        <div class="wine-badge text-white px-3 py-1 rounded-full text-sm font-bold">🍷 WINE</div>
        <span class="font-bold text-gray-800">管理画面</span>
        <div class="ml-auto flex gap-3 items-center">
          <a href="/admin/import" class="text-sm bg-green-100 text-green-700 hover:bg-green-200 px-3 py-1.5 rounded-lg font-medium transition">📥 一括インポート</a>
          <a href="/admin/photos" class="text-sm bg-purple-100 text-purple-700 hover:bg-purple-200 px-3 py-1.5 rounded-lg font-medium transition">📷 写真一括登録</a>
          <a href="/" class="text-sm text-gray-500 hover:text-gray-700">← サイトに戻る</a>
          <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700">ログアウト</button>
        </div>
      </div>
    </div>
  </header>

  <div id="authCheck" class="text-center py-20 text-gray-400">認証確認中...</div>

  <div id="adminContent" class="hidden max-w-7xl mx-auto px-4 py-6">

    <!-- 統計カード -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6" id="statsGrid"></div>

    <!-- タブ -->
    <div class="flex gap-2 mb-5 flex-wrap">
      <button onclick="switchTab('users')" id="btn-users" class="tab-active px-4 py-2 rounded-lg text-sm font-medium transition">ユーザー</button>
      <button onclick="switchTab('pending')" id="btn-pending" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition">承認待ち <span id="pendingBadge" class="ml-1 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full hidden"></span></button>
      <button onclick="switchTab('auctions')" id="btn-auctions" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition">オークション</button>
      <button onclick="switchTab('orders')" id="btn-orders" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition">注文</button>
    </div>

    <!-- ユーザータブ -->
    <div id="tab-users" class="fade-in">
      <div class="flex gap-2 mb-4">
        <input type="text" id="userSearch" placeholder="ユーザー名・メール検索..." onkeyup="debounce(loadUsers, 400)()"
          class="border border-gray-300 rounded-lg px-3 py-2 text-sm flex-1 focus:outline-none focus:border-purple-500">
      </div>
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="text-left px-4 py-3 text-gray-500 font-medium">ユーザー</th>
              <th class="text-left px-4 py-3 text-gray-500 font-medium hidden sm:table-cell">メール</th>
              <th class="text-center px-4 py-3 text-gray-500 font-medium">取引</th>
              <th class="text-center px-4 py-3 text-gray-500 font-medium">ステータス</th>
              <th class="text-center px-4 py-3 text-gray-500 font-medium">操作</th>
            </tr>
          </thead>
          <tbody id="usersTable"></tbody>
        </table>
        <div id="usersPager" class="flex justify-center gap-2 p-4 border-t border-gray-100"></div>
      </div>
    </div>

    <!-- 承認待ちタブ -->
    <div id="tab-pending" class="hidden fade-in">
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden" id="pendingContainer">
        <div class="text-center py-8 text-gray-400">読み込み中...</div>
      </div>
    </div>

    <!-- オークションタブ -->
    <div id="tab-auctions" class="hidden fade-in">
      <div class="flex gap-2 mb-4">
        <select id="auctionStatus" onchange="loadAuctions(1)"
          class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500">
          <option value="">すべて</option>
          <option value="active">開催中</option>
          <option value="ended">終了済み</option>
        </select>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="text-left px-4 py-3 text-gray-500 font-medium">商品</th>
              <th class="text-left px-4 py-3 text-gray-500 font-medium hidden sm:table-cell">出品者</th>
              <th class="text-right px-4 py-3 text-gray-500 font-medium">現在価格</th>
              <th class="text-center px-4 py-3 text-gray-500 font-medium">ステータス</th>
              <th class="text-center px-4 py-3 text-gray-500 font-medium">操作</th>
            </tr>
          </thead>
          <tbody id="auctionsTable"></tbody>
        </table>
        <div id="auctionsPager" class="flex justify-center gap-2 p-4 border-t border-gray-100"></div>
      </div>
    </div>

    <!-- 注文タブ -->
    <div id="tab-orders" class="hidden fade-in">
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="text-left px-4 py-3 text-gray-500 font-medium">商品</th>
              <th class="text-left px-4 py-3 text-gray-500 font-medium hidden sm:table-cell">落札者</th>
              <th class="text-right px-4 py-3 text-gray-500 font-medium">金額</th>
              <th class="text-center px-4 py-3 text-gray-500 font-medium">状態</th>
              <th class="text-left px-4 py-3 text-gray-500 font-medium hidden md:table-cell">配送先</th>
            </tr>
          </thead>
          <tbody id="ordersTable"></tbody>
        </table>
        <div id="ordersPager" class="flex justify-center gap-2 p-4 border-t border-gray-100"></div>
      </div>
    </div>
  </div>

  <!-- ユーザー詳細モーダル -->
  <div id="userModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-5 border-b border-gray-100">
        <h2 class="font-bold text-gray-900 text-lg">ユーザー詳細</h2>
        <button onclick="closeUserModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
      </div>
      <div id="userModalContent" class="p-5">
        <div class="text-center py-8 text-gray-400">読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- 承認/否認モーダル -->
  <div id="approvalModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
      <h2 class="font-bold text-gray-900 text-lg mb-4" id="approvalModalTitle">オークション審査</h2>
      <div id="approvalModalBody"></div>
      <div class="flex gap-3 mt-5">
        <button onclick="closeApprovalModal()" class="flex-1 border border-gray-300 text-gray-600 py-2 rounded-xl text-sm hover:bg-gray-50 transition">キャンセル</button>
        <button id="approvalModalConfirmBtn" class="flex-1 py-2 rounded-xl text-sm font-bold text-white transition"></button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) location.href = '/login';

    async function checkAdmin() {
      const res = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { location.href = '/login'; return; }
      const user = await res.json();
      if (!user.is_admin) {
        document.getElementById('authCheck').innerHTML = '<p class="text-red-500 py-20 text-center">管理者権限がありません</p>';
        return;
      }
      document.getElementById('authCheck').classList.add('hidden');
      document.getElementById('adminContent').classList.remove('hidden');
      loadStats();
      loadUsers();
      loadPendingBadge();
    }

    async function loadPendingBadge() {
      try {
        const res = await fetch('/api/admin/auctions/pending', { headers: { Authorization: `Bearer ${token}` } });
        const { total } = await res.json();
        const badge = document.getElementById('pendingBadge');
        if (total > 0) { badge.textContent = total; badge.classList.remove('hidden'); }
      } catch(e) {}
    }

    async function loadStats() {
      const res = await fetch('/api/admin/stats', { headers: { Authorization: `Bearer ${token}` } });
      const s = await res.json();
      document.getElementById('statsGrid').innerHTML = [
        { label: 'ユーザー', value: s.users.toLocaleString(), color: 'purple' },
        { label: 'オークション', value: s.auctions.toLocaleString() + ' (' + s.active + ' 開催中)', color: 'blue' },
        { label: '入札数', value: s.bids.toLocaleString(), color: 'amber' },
        { label: '売上', value: '¥' + (s.revenue||0).toLocaleString() + ' (' + s.paid + '件)', color: 'green' },
      ].map(c => `
        <div class="bg-white rounded-xl border border-gray-200 p-4">
          <p class="text-xs text-gray-400 mb-1">${c.label}</p>
          <p class="text-xl font-bold text-gray-900">${c.value}</p>
        </div>`).join('');
    }

    async function loadUsers(page = 1) {
      const q = document.getElementById('userSearch').value;
      const res = await fetch(`/api/admin/users?q=${encodeURIComponent(q)}&page=${page}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const { users, total, pages } = await res.json();

      document.getElementById('usersTable').innerHTML = users.map(u => `
        <tr class="border-b border-gray-100 hover:bg-gray-50">
          <td class="px-4 py-3">
            <button onclick="openUserModal(${u.id})" class="text-left">
              <div class="font-medium text-gray-900 hover:text-purple-700">${u.display_name || u.username}</div>
              <div class="text-xs text-gray-400">@${u.username}</div>
            </button>
            <div class="flex gap-1 mt-1 flex-wrap">
              ${u.is_admin ? '<span class="text-xs bg-purple-100 text-purple-700 px-1.5 rounded">管理者</span>' : ''}
              ${u.is_verified_seller ? '<span class="text-xs bg-blue-100 text-blue-700 px-1.5 rounded">認定セラー</span>' : ''}
              ${u.email_verified ? '<span class="text-xs bg-green-100 text-green-700 px-1.5 rounded">メール確認済</span>' : '<span class="text-xs bg-yellow-100 text-yellow-700 px-1.5 rounded">未確認</span>'}
            </div>
          </td>
          <td class="px-4 py-3 text-gray-500 hidden sm:table-cell">${u.email}</td>
          <td class="px-4 py-3 text-center text-gray-600">${u.trade_count}</td>
          <td class="px-4 py-3 text-center">
            ${u.is_blocked
              ? '<span class="bg-red-100 text-red-700 text-xs px-2 py-0.5 rounded-full">停止</span>'
              : '<span class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded-full">正常</span>'}
          </td>
          <td class="px-4 py-3 text-center">
            <div class="flex gap-1 justify-center flex-wrap">
              <button onclick="toggleBlock(${u.id}, ${u.is_blocked})"
                class="${u.is_blocked ? 'bg-green-100 text-green-700 hover:bg-green-200' : 'bg-red-100 text-red-700 hover:bg-red-200'} text-xs px-2 py-1 rounded transition">
                ${u.is_blocked ? '停止解除' : '停止'}
              </button>
              ${!u.is_admin ? `<button onclick="toggleAdmin(${u.id}, false)"
                class="bg-purple-100 text-purple-700 hover:bg-purple-200 text-xs px-2 py-1 rounded transition">管理者に</button>` : ''}
              <button onclick="openUserModal(${u.id})"
                class="bg-gray-100 text-gray-600 hover:bg-gray-200 text-xs px-2 py-1 rounded transition">詳細</button>
            </div>
          </td>
        </tr>
      `).join('') || '<tr><td colspan="5" class="text-center py-8 text-gray-400">ユーザーがいません</td></tr>';

      renderPager('usersPager', page, pages, loadUsers);
    }

    async function openUserModal(userId) {
      document.getElementById('userModal').classList.remove('hidden');
      document.getElementById('userModalContent').innerHTML = '<div class="text-center py-8 text-gray-400">読み込み中...</div>';
      try {
        const res = await fetch(`/api/admin/users/${userId}`, { headers: { Authorization: `Bearer ${token}` } });
        const u = await res.json();

        const licenseStatus = u.license_verified
          ? '<span class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded-full">✓ 確認済み</span>'
          : u.license_image_url
            ? '<span class="bg-yellow-100 text-yellow-700 text-xs px-2 py-0.5 rounded-full">⏳ 審査中</span>'
            : '<span class="bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded-full">未提出</span>';

        document.getElementById('userModalContent').innerHTML = `
          <div class="space-y-4">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-full bg-gradient-to-br from-purple-500 to-red-500 flex items-center justify-center text-white font-bold text-lg">
                ${(u.display_name || u.username)[0].toUpperCase()}
              </div>
              <div>
                <p class="font-bold text-gray-900">${u.display_name || u.username}</p>
                <p class="text-xs text-gray-400">@${u.username}</p>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-3 text-sm">
              <div class="bg-gray-50 rounded-lg p-3">
                <p class="text-xs text-gray-400 mb-1">メール</p>
                <p class="text-gray-800">${u.email}</p>
                ${u.email_verified ? '<span class="text-xs text-green-600">✓ 確認済</span>' : '<span class="text-xs text-yellow-600">未確認</span>'}
              </div>
              <div class="bg-gray-50 rounded-lg p-3">
                <p class="text-xs text-gray-400 mb-1">氏名 / 電話</p>
                <p class="text-gray-800">${u.full_name || '—'}</p>
                <p class="text-gray-500 text-xs">${u.phone || '—'}</p>
              </div>
              <div class="bg-gray-50 rounded-lg p-3">
                <p class="text-xs text-gray-400 mb-1">取引 / 評価</p>
                <p class="text-gray-800">${u.trade_count}件 / ⭐${(u.rating || 5.0).toFixed(1)}</p>
              </div>
              <div class="bg-gray-50 rounded-lg p-3">
                <p class="text-xs text-gray-400 mb-1">登録日</p>
                <p class="text-gray-800">${new Date(u.created_at).toLocaleDateString('ja-JP')}</p>
              </div>
            </div>

            ${u.address_pref || u.address_city ? `
            <div class="bg-gray-50 rounded-lg p-3 text-sm">
              <p class="text-xs text-gray-400 mb-1">住所</p>
              <p class="text-gray-800">${[u.address_zip, u.address_pref, u.address_city, u.address_street].filter(Boolean).join(' ')}</p>
            </div>` : ''}

            ${u.bank_name ? `
            <div class="bg-gray-50 rounded-lg p-3 text-sm">
              <p class="text-xs text-gray-400 mb-1">振込先口座</p>
              <p class="text-gray-800">${u.bank_name} ${u.bank_branch} ${u.bank_account_type}  ${u.bank_account_number}</p>
              <p class="text-gray-500 text-xs">${u.bank_account_holder || ''}</p>
            </div>` : ''}

            <div class="border border-gray-200 rounded-xl p-4">
              <div class="flex items-center justify-between mb-3">
                <h3 class="font-medium text-gray-800 text-sm">🪪 本人確認書類</h3>
                ${licenseStatus}
              </div>
              ${u.license_image_url
                ? `<img src="${u.license_image_url}" class="w-full max-h-48 object-contain rounded-lg border border-gray-200 mb-3" alt="本人確認書類">`
                : '<p class="text-sm text-gray-400 mb-3">書類が提出されていません</p>'}
              ${u.license_image_url && !u.license_verified ? `
              <div class="flex gap-2">
                <button onclick="reviewLicense(${u.id}, true)" class="flex-1 bg-green-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-green-700 transition">✓ 承認する</button>
                <button onclick="reviewLicense(${u.id}, false)" class="flex-1 bg-red-100 text-red-700 py-2 rounded-lg text-sm font-medium hover:bg-red-200 transition">✗ 否認する</button>
              </div>` : ''}
              ${u.license_verified ? `
              <button onclick="reviewLicense(${u.id}, false)" class="w-full border border-gray-300 text-gray-500 py-2 rounded-lg text-sm hover:bg-gray-50 transition">確認済みを取り消す</button>` : ''}
            </div>
          </div>`;
      } catch(e) {
        document.getElementById('userModalContent').innerHTML = '<div class="text-center py-8 text-red-400">読み込みに失敗しました</div>';
      }
    }

    function closeUserModal() {
      document.getElementById('userModal').classList.add('hidden');
    }

    async function reviewLicense(userId, approved) {
      const confirmMsg = approved ? 'この書類を承認しますか？（認定セラーになります）' : '書類の承認を取り消しますか？';
      if (!confirm(confirmMsg)) return;
      await fetch(`/api/admin/users/${userId}/license`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ approved })
      });
      closeUserModal();
      loadUsers();
    }

    async function loadPending() {
      const container = document.getElementById('pendingContainer');
      try {
        const res = await fetch('/api/admin/auctions/pending', { headers: { Authorization: `Bearer ${token}` } });
        const { auctions, total } = await res.json();

        // バッジ更新
        const badge = document.getElementById('pendingBadge');
        if (total > 0) { badge.textContent = total; badge.classList.remove('hidden'); }
        else badge.classList.add('hidden');

        if (!auctions.length) {
          container.innerHTML = '<div class="text-center py-12 text-gray-400"><div class="text-4xl mb-3">✅</div><p class="text-sm">承認待ちのオークションはありません</p></div>';
          return;
        }

        container.innerHTML = `
          <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-200">
              <tr>
                <th class="text-left px-4 py-3 text-gray-500 font-medium">商品</th>
                <th class="text-left px-4 py-3 text-gray-500 font-medium hidden sm:table-cell">出品者</th>
                <th class="text-right px-4 py-3 text-gray-500 font-medium">開始価格</th>
                <th class="text-center px-4 py-3 text-gray-500 font-medium">操作</th>
              </tr>
            </thead>
            <tbody>
              ${auctions.map(a => `
                <tr class="border-b border-gray-100 hover:bg-amber-50">
                  <td class="px-4 py-3">
                    <div class="font-medium text-gray-900">${a.title}</div>
                    <div class="text-xs text-gray-400">${a.producer} / 出品: ${new Date(a.created_at).toLocaleDateString('ja-JP')}</div>
                  </td>
                  <td class="px-4 py-3 text-gray-500 hidden sm:table-cell">
                    ${a.seller_name || a.seller}<br>
                    <span class="text-xs text-gray-400">${a.seller_email}</span>
                  </td>
                  <td class="px-4 py-3 text-right font-medium text-gray-900">¥${a.starting_price.toLocaleString()}</td>
                  <td class="px-4 py-3 text-center">
                    <div class="flex gap-2 justify-center">
                      <button onclick="approveAuction(${a.id})"
                        class="bg-green-600 text-white hover:bg-green-700 text-xs px-3 py-1.5 rounded-lg transition font-medium">承認</button>
                      <button onclick="openRejectModal(${a.id}, '${(a.title).replace(/'/g, "\\'")}')"
                        class="bg-red-100 text-red-700 hover:bg-red-200 text-xs px-3 py-1.5 rounded-lg transition font-medium">否認</button>
                      <a href="/detail?id=${a.id}" target="_blank"
                        class="bg-gray-100 text-gray-600 hover:bg-gray-200 text-xs px-3 py-1.5 rounded-lg transition">確認</a>
                    </div>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>`;
      } catch(e) {
        container.innerHTML = '<div class="text-center py-12 text-gray-400">読み込みに失敗しました</div>';
      }
    }

    async function approveAuction(id) {
      if (!confirm('このオークションを承認して公開しますか？')) return;
      const res = await fetch(`/api/admin/auctions/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ status: 'active' })
      });
      if (res.ok) { loadPending(); loadStats(); }
    }

    let rejectAuctionId = null;
    function openRejectModal(id, title) {
      rejectAuctionId = id;
      document.getElementById('approvalModalTitle').textContent = '出品を否認する';
      document.getElementById('approvalModalBody').innerHTML = `
        <p class="text-sm text-gray-600 mb-3">「${title}」の出品を否認します。出品者にメールで通知されます。</p>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">否認理由（任意）</label>
          <textarea id="rejectReason" rows="3" placeholder="例: 出品規約に反する内容が含まれています"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-500 resize-none"></textarea>
        </div>`;
      const btn = document.getElementById('approvalModalConfirmBtn');
      btn.textContent = '否認する';
      btn.className = 'flex-1 py-2 rounded-xl text-sm font-bold text-white bg-red-600 hover:bg-red-700 transition';
      btn.onclick = confirmReject;
      document.getElementById('approvalModal').classList.remove('hidden');
    }

    async function confirmReject() {
      const reason = document.getElementById('rejectReason').value.trim();
      const res = await fetch(`/api/admin/auctions/${rejectAuctionId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ status: 'rejected', reason })
      });
      closeApprovalModal();
      if (res.ok) { loadPending(); loadStats(); }
    }

    function closeApprovalModal() {
      document.getElementById('approvalModal').classList.add('hidden');
      rejectAuctionId = null;
    }

    async function toggleBlock(userId, current) {
      await fetch(`/api/admin/users/${userId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ is_blocked: !current })
      });
      loadUsers();
    }

    async function toggleAdmin(userId) {
      if (!confirm('このユーザーを管理者にしますか？')) return;
      await fetch(`/api/admin/users/${userId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ is_admin: true })
      });
      loadUsers();
    }

    async function verifySeller(userId) {
      await fetch(`/api/admin/users/${userId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ is_verified_seller: true })
      });
      loadUsers();
    }

    async function loadAuctions(page = 1) {
      const status = document.getElementById('auctionStatus').value;
      const res = await fetch(`/api/admin/auctions?status=${status}&page=${page}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const { auctions, pages } = await res.json();

      document.getElementById('auctionsTable').innerHTML = auctions.map(a => `
        <tr class="border-b border-gray-100 hover:bg-gray-50">
          <td class="px-4 py-3">
            <div class="font-medium text-gray-900 text-sm">${a.title}</div>
            <div class="text-xs text-gray-400">${a.producer} / 入札${a.bid_count}件</div>
          </td>
          <td class="px-4 py-3 text-gray-500 hidden sm:table-cell">${a.seller}</td>
          <td class="px-4 py-3 text-right font-medium text-gray-900">¥${a.current_price.toLocaleString()}</td>
          <td class="px-4 py-3 text-center">
            ${a.status === 'active'
              ? '<span class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded-full">開催中</span>'
              : '<span class="bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded-full">終了済み</span>'}
          </td>
          <td class="px-4 py-3 text-center">
            ${a.status === 'active' ? `
              <button onclick="forceEndAuction(${a.id})"
                class="bg-red-100 text-red-700 hover:bg-red-200 text-xs px-2 py-1 rounded transition">強制終了</button>` : ''}
            <a href="/detail?id=${a.id}" target="_blank" class="bg-gray-100 text-gray-600 hover:bg-gray-200 text-xs px-2 py-1 rounded transition ml-1">詳細</a>
          </td>
        </tr>
      `).join('') || '<tr><td colspan="5" class="text-center py-8 text-gray-400">オークションがありません</td></tr>';

      renderPager('auctionsPager', page, pages, loadAuctions);
    }

    async function forceEndAuction(id) {
      if (!confirm('このオークションを強制終了しますか？')) return;
      await fetch(`/api/admin/auctions/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ status: 'ended' })
      });
      loadAuctions();
    }

    async function loadOrders(page = 1) {
      const res = await fetch(`/api/admin/orders?page=${page}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const { orders, pages } = await res.json();

      document.getElementById('ordersTable').innerHTML = orders.map(o => `
        <tr class="border-b border-gray-100 hover:bg-gray-50">
          <td class="px-4 py-3">
            <div class="font-medium text-gray-900 text-sm truncate max-w-48">${o.title}</div>
            <div class="text-xs text-gray-400">${new Date(o.created_at).toLocaleDateString('ja-JP')}</div>
          </td>
          <td class="px-4 py-3 text-gray-500 hidden sm:table-cell">${o.buyer}</td>
          <td class="px-4 py-3 text-right font-medium text-gray-900">¥${o.amount.toLocaleString()}</td>
          <td class="px-4 py-3 text-center">
            ${o.status === 'paid'
              ? '<span class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded-full">支払済</span>'
              : '<span class="bg-yellow-100 text-yellow-700 text-xs px-2 py-0.5 rounded-full">未払い</span>'}
          </td>
          <td class="px-4 py-3 text-gray-500 text-xs hidden md:table-cell">${o.shipping_address || '—'}</td>
        </tr>
      `).join('') || '<tr><td colspan="5" class="text-center py-8 text-gray-400">注文がありません</td></tr>';

      renderPager('ordersPager', page, pages, loadOrders);
    }

    function renderPager(containerId, page, pages, loadFn) {
      if (pages <= 1) { document.getElementById(containerId).innerHTML = ''; return; }
      const btns = [];
      for (let i = 1; i <= pages; i++) {
        btns.push(`<button onclick="${loadFn.name}(${i})"
          class="${i === page ? 'bg-purple-700 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'} px-3 py-1 rounded text-sm">${i}</button>`);
      }
      document.getElementById(containerId).innerHTML = btns.join('');
    }

    function switchTab(name) {
      ['users', 'pending', 'auctions', 'orders'].forEach(t => {
        document.getElementById(`btn-${t}`).className = t === name ? 'tab-active px-4 py-2 rounded-lg text-sm font-medium transition' : 'tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition';
        document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== name);
      });
      if (name === 'pending') loadPending();
      if (name === 'auctions') loadAuctions();
      if (name === 'orders') loadOrders();
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      location.href = '/';
    }

    let debounceTimer;
    function debounce(fn, ms) {
      return (...args) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => fn(...args), ms);
      };
    }

    checkAdmin();
  </script>
</body>
</html>
