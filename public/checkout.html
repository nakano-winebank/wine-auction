<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>落札決済 — ワインオークション</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans JP', sans-serif; }
    .wine-badge { background: linear-gradient(135deg, #7B2D8B, #C0392B); }
    #card-element { padding: 12px; border: 1px solid #D1D5DB; border-radius: 8px; background: white; }
    #card-element.StripeElement--focus { border-color: #7C3AED; box-shadow: 0 0 0 2px rgba(124,58,237,0.2); }
    #card-element.StripeElement--invalid { border-color: #EF4444; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }
    .step-active { background: #7C3AED; color: white; }
    .step-done { background: #10B981; color: white; }
    .step-inactive { background: #E5E7EB; color: #6B7280; }
  </style>
</head>
<body class="bg-gray-50">

  <!-- ヘッダー -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-2xl mx-auto px-4">
      <div class="flex items-center h-14 gap-3">
        <a href="/" class="text-gray-400 hover:text-gray-600 p-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <a href="/" class="flex items-center gap-2">
          <div class="wine-badge text-white px-3 py-1 rounded-full text-sm font-bold">🍷 WINE</div>
        </a>
        <span class="font-bold text-gray-700 ml-1">落札決済</span>
      </div>
    </div>
  </header>

  <div class="max-w-2xl mx-auto px-4 py-6">

    <!-- ローディング -->
    <div id="loadingState" class="text-center py-16">
      <div class="text-4xl mb-3 animate-pulse">🍷</div>
      <p class="text-gray-500">読み込み中...</p>
    </div>

    <!-- エラー -->
    <div id="errorState" class="hidden text-center py-16">
      <div class="text-4xl mb-3">😢</div>
      <p class="text-gray-500" id="errorMsg">エラーが発生しました</p>
      <a href="/" class="mt-4 inline-block text-purple-600 underline text-sm">トップに戻る</a>
    </div>

    <!-- メインコンテンツ -->
    <div id="mainContent" class="hidden">

      <!-- ステップインジケーター -->
      <div class="flex items-center gap-2 mb-6 fade-in">
        <div class="flex items-center gap-1.5">
          <div class="w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold step-done" id="step1-badge">✓</div>
          <span class="text-sm text-green-700 font-medium">落札確認</span>
        </div>
        <div class="flex-1 h-px bg-gray-300"></div>
        <div class="flex items-center gap-1.5">
          <div class="w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold step-active" id="step2-badge">2</div>
          <span class="text-sm text-purple-700 font-medium" id="step2-label">配送先入力</span>
        </div>
        <div class="flex-1 h-px bg-gray-300"></div>
        <div class="flex items-center gap-1.5">
          <div class="w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold step-inactive" id="step3-badge">3</div>
          <span class="text-sm text-gray-400" id="step3-label">お支払い</span>
        </div>
      </div>

      <!-- 落札商品カード -->
      <div class="bg-white rounded-2xl border border-gray-200 p-5 mb-5 fade-in">
        <h2 class="text-sm font-bold text-gray-500 mb-3">落札商品</h2>
        <div class="flex items-center gap-4">
          <div class="bg-gradient-to-br w-16 h-16 rounded-xl flex items-center justify-center text-2xl flex-shrink-0" id="auctionEmoji"></div>
          <div class="flex-1 min-w-0">
            <p class="font-bold text-gray-900" id="auctionTitle"></p>
            <p class="text-sm text-gray-500" id="auctionProducer"></p>
            <p class="text-sm text-gray-400" id="auctionSeller"></p>
          </div>
          <div class="text-right flex-shrink-0">
            <p class="text-xs text-gray-400">落札金額</p>
            <p class="text-xl font-bold text-gray-900" id="auctionPrice"></p>
          </div>
        </div>
      </div>

      <!-- ステップ2: 配送先 -->
      <div id="shippingStep" class="bg-white rounded-2xl border border-gray-200 p-5 mb-5 fade-in">
        <h2 class="font-bold text-gray-800 mb-4">配送先情報</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">お名前 <span class="text-red-500">*</span></label>
            <input type="text" id="shippingName" placeholder="山田 太郎" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">郵便番号 <span class="text-red-500">*</span></label>
            <input type="text" id="shippingZip" placeholder="123-4567" maxlength="8"
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">住所 <span class="text-red-500">*</span></label>
            <input type="text" id="shippingAddress" placeholder="東京都新宿区西新宿1-1-1"
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">電話番号</label>
            <input type="tel" id="shippingPhone" placeholder="090-1234-5678"
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
          </div>

          <!-- 配送方法 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">配送方法 <span class="text-red-500">*</span></label>
            <div class="grid grid-cols-2 gap-3">
              <label class="flex items-start gap-3 border-2 border-purple-500 rounded-xl p-3 cursor-pointer bg-purple-50" id="label-normal">
                <input type="radio" name="shippingMethod" value="normal" checked class="mt-0.5 accent-purple-600" onchange="updateShippingMethod()">
                <div>
                  <p class="text-sm font-bold text-gray-800">通常宅配便</p>
                  <p class="text-xs text-gray-500 mt-0.5">¥800（送料込み）</p>
                </div>
              </label>
              <label class="flex items-start gap-3 border-2 border-gray-200 rounded-xl p-3 cursor-pointer hover:border-blue-400 transition" id="label-cool">
                <input type="radio" name="shippingMethod" value="cool" class="mt-0.5 accent-blue-600" onchange="updateShippingMethod()">
                <div>
                  <p class="text-sm font-bold text-gray-800">🧊 クール便</p>
                  <p class="text-xs text-gray-500 mt-0.5">+¥700（冷蔵配送）</p>
                  <p class="text-xs text-blue-500 mt-0.5">夏季・高級ワインに推奨</p>
                </div>
              </label>
            </div>
          </div>
        </div>
        <button onclick="proceedToPayment()" id="toPaymentBtn"
          class="w-full mt-5 bg-purple-700 text-white py-3 rounded-xl font-bold text-sm hover:bg-purple-800 transition">
          お支払いへ進む →
        </button>
      </div>

      <!-- ステップ3: カード情報 -->
      <div id="paymentStep" class="hidden bg-white rounded-2xl border border-gray-200 p-5 mb-5 fade-in">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-gray-800">お支払い方法</h2>
          <button onclick="backToShipping()" class="text-sm text-gray-500 hover:text-gray-700">← 配送先に戻る</button>
        </div>

        <!-- テストモード通知 -->
        <div id="testModeNotice" class="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-4 text-sm text-amber-700">
          <strong>🧪 テストモード:</strong> カード番号 <code class="bg-amber-100 px-1 rounded">4242 4242 4242 4242</code>、有効期限・CVCは任意の数字でテスト可能です。
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-2">クレジットカード</label>
          <div id="card-element" class="transition"></div>
          <p id="card-error" class="text-red-500 text-xs mt-1.5 hidden"></p>
        </div>

        <!-- 支払い詳細 -->
        <div class="bg-gray-50 rounded-xl p-4 mb-5 text-sm">
          <div class="flex justify-between text-gray-600 mb-1.5">
            <span>落札金額</span>
            <span id="summaryPrice"></span>
          </div>
          <div class="flex justify-between text-gray-600 mb-1.5">
            <span>配送方法</span>
            <span id="summaryMethod"></span>
          </div>
          <div class="flex justify-between text-gray-600 mb-1.5" id="summaryFeeRow">
            <span>送料</span>
            <span id="summaryFee"></span>
          </div>
          <div class="flex justify-between text-gray-600 mb-1.5">
            <span>配送先</span>
            <span id="summaryAddress" class="text-right max-w-48 truncate"></span>
          </div>
          <div class="border-t border-gray-200 mt-2.5 pt-2.5 flex justify-between font-bold text-gray-900">
            <span>合計</span>
            <span id="summaryTotal"></span>
          </div>
        </div>

        <button onclick="submitPayment()" id="payBtn"
          class="w-full bg-red-700 text-white py-3.5 rounded-xl font-bold text-sm hover:bg-red-800 transition flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <span id="payBtnText">¥<span id="payBtnAmount"></span> を支払う</span>
        </button>
        <p class="text-center text-xs text-gray-400 mt-2">Stripeによる安全な決済</p>
      </div>

      <!-- 完了 -->
      <div id="completeStep" class="hidden text-center py-12 fade-in">
        <div class="text-6xl mb-4">🎉</div>
        <h2 class="text-xl font-bold text-gray-900 mb-2">ご注文ありがとうございます！</h2>
        <p class="text-gray-500 text-sm mb-2">お支払いが完了しました。</p>
        <p class="text-gray-500 text-sm mb-6">出品者より配送のご連絡が届きます。</p>
        <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-left mb-6">
          <p class="text-sm font-bold text-green-800 mb-2">注文内容</p>
          <p class="text-sm text-green-700" id="completeTitle"></p>
          <p class="text-sm text-green-700" id="completeAmount"></p>
          <p class="text-sm text-green-700" id="completeAddress"></p>
        </div>
        <a href="/mypage" class="inline-block bg-purple-700 text-white px-6 py-2.5 rounded-full font-medium text-sm hover:bg-purple-800 transition">マイページで確認</a>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) location.href = '/login';

    const params = new URLSearchParams(location.search);
    const auctionId = params.get('id');
    if (!auctionId) location.href = '/';

    let stripe, cardElement, orderData;
    let shippingData = {};

    const SHIPPING_FEES = { normal: 800, cool: 1500 };

    function updateShippingMethod() {
      const method = document.querySelector('input[name="shippingMethod"]:checked').value;
      document.getElementById('label-normal').className = method === 'normal'
        ? 'flex items-start gap-3 border-2 border-purple-500 rounded-xl p-3 cursor-pointer bg-purple-50'
        : 'flex items-start gap-3 border-2 border-gray-200 rounded-xl p-3 cursor-pointer hover:border-purple-400 transition';
      document.getElementById('label-cool').className = method === 'cool'
        ? 'flex items-start gap-3 border-2 border-blue-500 rounded-xl p-3 cursor-pointer bg-blue-50'
        : 'flex items-start gap-3 border-2 border-gray-200 rounded-xl p-3 cursor-pointer hover:border-blue-400 transition';
    }

    // Stripe公開キー（環境変数から、またはテストキー）
    const STRIPE_PK = 'pk_test_YOUR_PUBLISHABLE_KEY_HERE';

    async function init() {
      try {
        const res = await fetch(`/api/stripe/order/${auctionId}`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!res.ok) {
          const err = await res.json();
          showError(err.error || 'エラーが発生しました');
          return;
        }

        orderData = await res.json();

        // すでに支払済みなら完了表示
        if (orderData.order && orderData.order.status === 'paid') {
          showAlreadyPaid(orderData);
          return;
        }

        renderAuctionCard(orderData.auction);
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');

        // Stripe初期化（テストキー設定済みの場合のみ）
        if (STRIPE_PK !== 'pk_test_YOUR_PUBLISHABLE_KEY_HERE') {
          stripe = Stripe(STRIPE_PK);
        }

      } catch (e) {
        showError('データの取得に失敗しました');
      }
    }

    function renderAuctionCard(auction) {
      document.getElementById('auctionEmoji').textContent = auction.image_emoji;
      document.getElementById('auctionEmoji').className = `bg-gradient-to-br ${auction.image_color} w-16 h-16 rounded-xl flex items-center justify-center text-2xl flex-shrink-0`;
      document.getElementById('auctionTitle').textContent = auction.title;
      document.getElementById('auctionProducer').textContent = auction.producer + (auction.vintage ? ' ' + auction.vintage : '');
      document.getElementById('auctionSeller').textContent = '出品: ' + (auction.seller_name || auction.seller_username);
      document.getElementById('auctionPrice').textContent = '¥' + auction.current_price.toLocaleString();
    }

    function proceedToPayment() {
      const name = document.getElementById('shippingName').value.trim();
      const zip = document.getElementById('shippingZip').value.trim();
      const address = document.getElementById('shippingAddress').value.trim();
      const phone = document.getElementById('shippingPhone').value.trim();
      const method = document.querySelector('input[name="shippingMethod"]:checked').value;
      const fee = SHIPPING_FEES[method] || 800;

      if (!name || !zip || !address) {
        alert('お名前・郵便番号・住所は必須です');
        return;
      }

      shippingData = { name, zip, address, phone, method, fee };

      // ステップUI更新
      document.getElementById('step2-badge').className = 'w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold step-done';
      document.getElementById('step2-badge').textContent = '✓';
      document.getElementById('step3-badge').className = 'w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold step-active';
      document.getElementById('step3-label').className = 'text-sm text-purple-700 font-medium';

      document.getElementById('shippingStep').classList.add('hidden');
      document.getElementById('paymentStep').classList.remove('hidden');

      // 金額セット
      const price = orderData.auction.current_price;
      const total = price + fee;
      document.getElementById('summaryPrice').textContent = '¥' + price.toLocaleString();
      document.getElementById('summaryMethod').textContent = method === 'cool' ? '🧊 クール便' : '通常宅配便';
      document.getElementById('summaryFee').textContent = '¥' + fee.toLocaleString();
      document.getElementById('summaryAddress').textContent = address;
      document.getElementById('summaryTotal').textContent = '¥' + total.toLocaleString();
      document.getElementById('payBtnAmount').textContent = total.toLocaleString();

      // Stripeカード要素マウント
      if (stripe) {
        document.getElementById('testModeNotice').classList.remove('hidden');
        const elements = stripe.elements();
        cardElement = elements.create('card', {
          style: {
            base: { fontSize: '14px', fontFamily: 'Noto Sans JP, sans-serif', color: '#1F2937' }
          }
        });
        cardElement.mount('#card-element');
        cardElement.on('change', e => {
          const errEl = document.getElementById('card-error');
          if (e.error) { errEl.textContent = e.error.message; errEl.classList.remove('hidden'); }
          else { errEl.classList.add('hidden'); }
        });
      } else {
        // Stripe未設定 — デモモード表示
        document.getElementById('card-element').innerHTML = `
          <div class="text-center py-4 text-sm text-gray-500">
            <p class="mb-1">⚙️ <strong>Stripe未設定</strong></p>
            <p class="text-xs">STRIPE_SECRET_KEY / STRIPE_PK を設定するとカード入力が表示されます</p>
          </div>`;
        document.getElementById('testModeNotice').classList.add('hidden');
      }
    }

    function backToShipping() {
      document.getElementById('paymentStep').classList.add('hidden');
      document.getElementById('shippingStep').classList.remove('hidden');
      document.getElementById('step2-badge').className = 'w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold step-active';
      document.getElementById('step2-badge').textContent = '2';
      document.getElementById('step3-badge').className = 'w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold step-inactive';
      document.getElementById('step3-label').className = 'text-sm text-gray-400';
    }

    async function submitPayment() {
      const btn = document.getElementById('payBtn');
      btn.disabled = true;
      document.getElementById('payBtnText').innerHTML = '<span class="animate-pulse">処理中...</span>';

      try {
        if (stripe && cardElement) {
          // Stripe実決済
          const { data: intentData } = await fetch('/api/stripe/create-payment-intent', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify({ auction_id: auctionId })
          }).then(r => r.json().then(d => ({ data: d })));

          if (!intentData.client_secret) throw new Error(intentData.error || '決済準備エラー');

          const { error, paymentIntent } = await stripe.confirmCardPayment(intentData.client_secret, {
            payment_method: { card: cardElement }
          });

          if (error) throw new Error(error.message);

          await confirmOrder(paymentIntent.id);
        } else {
          // デモモード（Stripe未設定）
          await fetch('/api/stripe/create-payment-intent', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify({ auction_id: auctionId })
          });

          await confirmOrder('demo_' + Date.now());
        }
      } catch (e) {
        alert('エラー: ' + e.message);
        btn.disabled = false;
        document.getElementById('payBtnText').innerHTML = '¥<span id="payBtnAmount">' + orderData.auction.current_price.toLocaleString() + '</span> を支払う';
      }
    }

    async function confirmOrder(paymentIntentId) {
      const res = await fetch('/api/stripe/confirm-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({
          auction_id: auctionId,
          payment_intent_id: paymentIntentId,
          shipping_name: shippingData.name,
          shipping_zip: shippingData.zip,
          shipping_address: shippingData.address,
          shipping_phone: shippingData.phone,
          shipping_method: shippingData.method,
          shipping_fee: shippingData.fee
        })
      });

      const data = await res.json();
      if (!data.success) throw new Error(data.error || '注文確定エラー');

      // 完了表示
      const total = orderData.auction.current_price + (shippingData.fee || 0);
      document.getElementById('paymentStep').classList.add('hidden');
      document.getElementById('step3-badge').className = 'w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold step-done';
      document.getElementById('step3-badge').textContent = '✓';
      document.getElementById('completeStep').classList.remove('hidden');
      document.getElementById('completeTitle').textContent = orderData.auction.title;
      document.getElementById('completeAmount').textContent = `お支払い合計: ¥${total.toLocaleString()}（${shippingData.method === 'cool' ? '🧊 クール便' : '通常宅配便'}）`;
      document.getElementById('completeAddress').textContent = '配送先: ' + shippingData.address;
    }

    function showError(msg) {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorState').classList.remove('hidden');
    }

    function showAlreadyPaid(data) {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      renderAuctionCard(data.auction);
      document.getElementById('shippingStep').classList.add('hidden');
      document.getElementById('completeStep').classList.remove('hidden');
      document.getElementById('completeTitle').textContent = data.auction.title;
      document.getElementById('completeAmount').textContent = '落札金額: ¥' + data.auction.current_price.toLocaleString();
      document.getElementById('completeAddress').textContent = '配送先: ' + (data.order.shipping_address || '');
      // ステップ全完了
      ['step2-badge', 'step3-badge'].forEach(id => {
        document.getElementById(id).className = 'w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold step-done';
        document.getElementById(id).textContent = '✓';
      });
    }

    init();
  </script>
</body>
</html>
