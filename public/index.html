<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ワインオークション</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans JP', sans-serif; }
    .wine-badge { background: linear-gradient(135deg, #7B2D8B, #C0392B); }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
    .card-hover { transition: all 0.2s ease; }
    .filter-chip.active { background: #7B2D8B; color: white; border-color: #7B2D8B; }
    .tag-vintage { background: #F3E8FF; color: #6B21A8; }
    .tag-region { background: #FEF3C7; color: #92400E; }
    .tag-grape { background: #DCFCE7; color: #166534; }
    .ending-badge { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
    .timer-urgent { color: #C0392B; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .card-fade { animation: fadeIn 0.3s ease; }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .winemark { background: linear-gradient(135deg, #6B1A1A 0%, #9B2335 50%, #C0392B 100%); box-shadow: 0 2px 6px rgba(0,0,0,0.35); }
  </style>
</head>
<body class="bg-gray-50">

  <!-- ヘッダー -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex items-center h-14 gap-2">
        <!-- ロゴ -->
        <a href="/" class="flex items-center gap-2 flex-shrink-0">
          <div class="wine-badge text-white px-3 py-1 rounded-full text-sm font-bold">🍷 WINE</div>
          <span class="text-gray-800 font-bold hidden sm:block">オークション</span>
        </a>
        <!-- PC検索 -->
        <div class="hidden md:flex flex-1 max-w-md mx-4">
          <div class="relative w-full">
            <input type="text" id="searchInput" placeholder="ワインを検索（生産者、産地、ヴィンテージ...）"
              class="w-full border border-gray-300 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-purple-500 pr-10">
            <button onclick="applyFilters()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </button>
          </div>
        </div>
        <!-- 右側アクション -->
        <div class="ml-auto flex items-center gap-2">
          <!-- モバイル検索アイコン -->
          <button class="md:hidden text-gray-500 p-2" onclick="toggleMobileSearch()">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </button>
          <a href="/sell" class="text-sm text-gray-600 hover:text-gray-900 hidden" id="sellBtn">出品する</a>
          <a href="/mypage" class="text-sm text-gray-600 hover:text-gray-900 hidden" id="mypageBtn">マイページ</a>
          <button onclick="logout()" class="text-sm text-gray-500 hover:text-gray-700 hidden" id="logoutBtn">ログアウト</button>
          <a href="/login" class="bg-purple-700 text-white text-sm px-4 py-1.5 rounded-full hover:bg-purple-800 flex-shrink-0" id="loginBtn">ログイン</a>
        </div>
      </div>
      <!-- モバイル検索バー（トグル） -->
      <div id="mobileSearchBar" class="hidden pb-2 md:hidden">
        <div class="relative">
          <input type="text" id="searchInputMobile" placeholder="ワインを検索..."
            class="w-full border border-gray-300 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-purple-500 pr-10">
          <button onclick="applyFilters(true)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="max-w-6xl mx-auto px-4 py-6">

    <!-- フィルターバー -->
    <div class="bg-white rounded-xl border border-gray-200 p-4 mb-6">
      <div class="flex flex-wrap gap-3 items-center">
        <span class="text-sm font-medium text-gray-600 mr-1">産地</span>
        <button class="filter-chip active text-sm px-3 py-1 rounded-full border border-purple-700 transition" data-region="" onclick="setRegion(this, '')">すべて</button>
        <button class="filter-chip text-sm px-3 py-1 rounded-full border border-gray-300 hover:border-purple-400 transition" data-region="ボルドー" onclick="setRegion(this, 'ボルドー')">🇫🇷 ボルドー</button>
        <button class="filter-chip text-sm px-3 py-1 rounded-full border border-gray-300 hover:border-purple-400 transition" data-region="ブルゴーニュ" onclick="setRegion(this, 'ブルゴーニュ')">🇫🇷 ブルゴーニュ</button>
        <button class="filter-chip text-sm px-3 py-1 rounded-full border border-gray-300 hover:border-purple-400 transition" data-region="イタリア" onclick="setRegion(this, 'イタリア')">🇮🇹 イタリア</button>
        <button class="filter-chip text-sm px-3 py-1 rounded-full border border-gray-300 hover:border-purple-400 transition" data-region="スペイン" onclick="setRegion(this, 'スペイン')">🇪🇸 スペイン</button>
        <button class="filter-chip text-sm px-3 py-1 rounded-full border border-gray-300 hover:border-purple-400 transition" data-region="カリフォルニア" onclick="setRegion(this, 'カリフォルニア')">🇺🇸 カリフォルニア</button>
        <button class="filter-chip text-sm px-3 py-1 rounded-full border border-gray-300 hover:border-purple-400 transition" data-region="シャンパーニュ" onclick="setRegion(this, 'シャンパーニュ')">🇫🇷 シャンパーニュ</button>

        <div class="h-5 w-px bg-gray-300 mx-1"></div>

        <select id="vintageSelect" onchange="applyFilters()" class="text-sm border border-gray-300 rounded-full px-3 py-1 focus:outline-none focus:border-purple-500">
          <option value="">ヴィンテージ</option>
          <option value="2020,2030">2020〜現在</option>
          <option value="2010,2019">2010〜2019</option>
          <option value="2000,2009">2000〜2009</option>
          <option value="1990,1999">1990〜1999</option>
          <option value="1900,1989">1990年以前</option>
        </select>

        <select id="priceSelect" onchange="applyFilters()" class="text-sm border border-gray-300 rounded-full px-3 py-1 focus:outline-none focus:border-purple-500">
          <option value="">価格帯</option>
          <option value="0,10000">〜¥10,000</option>
          <option value="10000,50000">¥10,000〜¥50,000</option>
          <option value="50000,100000">¥50,000〜¥100,000</option>
          <option value="100000,99999999">¥100,000以上</option>
        </select>

        <div class="ml-auto">
          <select id="sortSelect" onchange="applyFilters()" class="text-sm border border-gray-300 rounded-lg px-3 py-1 focus:outline-none focus:border-purple-500">
            <option value="end">終了が近い順</option>
            <option value="bids">入札数が多い順</option>
            <option value="price_high">価格が高い順</option>
            <option value="price_low">価格が低い順</option>
            <option value="new">新着順</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 集計バー -->
    <div class="flex items-center justify-between mb-4">
      <p class="text-sm text-gray-600" id="totalCount"><span class="font-bold text-gray-900">—</span> 件 出品中</p>
      <div class="flex gap-2 text-sm text-gray-500" id="endingSoonBadge" style="display:none!important">
        <span class="flex items-center gap-1">
          <span class="w-2 h-2 bg-red-500 rounded-full inline-block animate-pulse"></span>
          終了間近 <span id="endingSoonCount">0</span>件
        </span>
      </div>
    </div>

    <!-- 商品グリッド -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="auctionGrid">
      <!-- スケルトン -->
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="skeleton h-44"></div>
        <div class="p-3"><div class="skeleton h-3 rounded mb-2"></div><div class="skeleton h-4 rounded mb-3"></div><div class="skeleton h-5 w-24 rounded"></div></div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="skeleton h-44"></div>
        <div class="p-3"><div class="skeleton h-3 rounded mb-2"></div><div class="skeleton h-4 rounded mb-3"></div><div class="skeleton h-5 w-24 rounded"></div></div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="skeleton h-44"></div>
        <div class="p-3"><div class="skeleton h-3 rounded mb-2"></div><div class="skeleton h-4 rounded mb-3"></div><div class="skeleton h-5 w-24 rounded"></div></div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="skeleton h-44"></div>
        <div class="p-3"><div class="skeleton h-3 rounded mb-2"></div><div class="skeleton h-4 rounded mb-3"></div><div class="skeleton h-5 w-24 rounded"></div></div>
      </div>
    </div>

    <!-- 空状態 -->
    <div id="emptyState" class="hidden text-center py-16">
      <div class="text-5xl mb-4">🍷</div>
      <p class="text-gray-500">条件に一致するオークションが見つかりませんでした</p>
    </div>

  </div>

  <script>
    let currentRegion = '';
    let allAuctions = [];
    let timers = {};

    // 認証状態
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');

    if (user) {
      document.getElementById('loginBtn').classList.add('hidden');
      document.getElementById('logoutBtn').classList.remove('hidden');
      document.getElementById('sellBtn').classList.remove('hidden');
      document.getElementById('mypageBtn').classList.remove('hidden');
    }

    function toggleMobileSearch() {
      const bar = document.getElementById('mobileSearchBar');
      bar.classList.toggle('hidden');
      if (!bar.classList.contains('hidden')) document.getElementById('searchInputMobile').focus();
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      location.reload();
    }

    // Socket.io
    let socket;
    try {
      socket = io();
      socket.on('bid:new', (data) => {
        // 一覧の価格をリアルタイム更新
        const card = document.querySelector(`[data-auction-id="${data.auction_id}"]`);
        if (card) {
          const priceEl = card.querySelector('.auction-price');
          const bidCountEl = card.querySelector('.auction-bid-count');
          if (priceEl) priceEl.textContent = '¥' + data.new_price.toLocaleString();
          if (bidCountEl) bidCountEl.textContent = `入札 ${data.bid_count}件`;
        }
      });
    } catch(e) {}

    // フィルター
    function setRegion(btn, region) {
      currentRegion = region;
      document.querySelectorAll('.filter-chip').forEach(b => {
        b.classList.remove('active');
        b.classList.add('border-gray-300');
        b.classList.remove('border-purple-700');
      });
      btn.classList.add('active');
      btn.classList.remove('border-gray-300');
      applyFilters();
    }

    function applyFilters(fromMobile = false) {
      const q = fromMobile
        ? document.getElementById('searchInputMobile').value
        : document.getElementById('searchInput').value;
      const sort = document.getElementById('sortSelect').value;
      const vintageVal = document.getElementById('vintageSelect').value;
      const priceVal = document.getElementById('priceSelect').value;

      const params = new URLSearchParams();
      if (currentRegion) params.set('region', currentRegion);
      if (q) params.set('q', q);
      if (sort) params.set('sort', sort);
      if (vintageVal) {
        const [vFrom, vTo] = vintageVal.split(',');
        params.set('vintage_from', vFrom);
        params.set('vintage_to', vTo);
      }
      if (priceVal) {
        const [pMin, pMax] = priceVal.split(',');
        params.set('price_min', pMin);
        params.set('price_max', pMax);
      }

      loadAuctions(params);
    }

    // オークション一覧取得
    async function loadAuctions(params = new URLSearchParams()) {
      const headers = token ? { Authorization: `Bearer ${token}` } : {};
      try {
        const res = await fetch(`/api/auctions?${params}`, { headers });
        const data = await res.json();
        allAuctions = data.auctions || [];
        renderAuctions(allAuctions);
      } catch (e) {
        document.getElementById('auctionGrid').innerHTML = '<div class="col-span-4 text-center py-12 text-gray-400">サーバーに接続できませんでした</div>';
      }
    }

    function renderAuctions(auctions) {
      // タイマークリア
      Object.values(timers).forEach(clearInterval);
      timers = {};

      const grid = document.getElementById('auctionGrid');
      const empty = document.getElementById('emptyState');

      // 集計更新
      document.getElementById('totalCount').innerHTML = `<span class="font-bold text-gray-900">${auctions.length}</span> 件 出品中`;
      const endingSoon = auctions.filter(a => {
        const diff = new Date(a.end_time) - new Date();
        return diff > 0 && diff < 3600000;
      });
      if (endingSoon.length > 0) {
        document.getElementById('endingSoonCount').textContent = endingSoon.length;
        document.getElementById('endingSoonBadge').style.removeProperty('display');
      }

      if (!auctions.length) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      grid.innerHTML = auctions.map(a => {
        const endTime = new Date(a.end_time);
        const diffMs = endTime - new Date();
        const isEndingSoon = diffMs > 0 && diffMs < 3600000;
        const timerHtml = isEndingSoon
          ? `<div class="ending-badge absolute top-2 left-2 text-xs px-2 py-0.5 rounded-full font-medium timer-label" data-end="${a.end_time}">計算中...</div>`
          : (diffMs < 24 * 3600000 && diffMs > 0)
            ? `<div class="ending-badge absolute top-2 left-2 text-xs px-2 py-0.5 rounded-full font-medium">残り ${formatTimeShort(diffMs)}</div>`
            : '';

        const watchBtn = a.is_watched
          ? `<button class="absolute top-10 right-2 text-red-400 bg-white rounded-full p-1 shadow" onclick="toggleWatch(event, ${a.id}, this)">❤️</button>`
          : `<button class="absolute top-10 right-2 text-gray-300 bg-white rounded-full p-1 shadow hover:text-red-400" onclick="toggleWatch(event, ${a.id}, this)">🤍</button>`;
        const winemarkBadge = `<div class="winemark absolute top-2 right-2 text-white rounded-md px-1.5 py-0.5 text-center" style="min-width:46px;"><div style="font-size:8px;font-weight:900;letter-spacing:0.4px;line-height:1.5;">WineBank</div><div style="font-size:7px;line-height:1.3;">✓ 真贋済み</div></div>`;

        return `
          <a href="/detail?id=${a.id}" class="card-hover card-fade bg-white rounded-xl border border-gray-200 overflow-hidden block" data-auction-id="${a.id}">
            <div class="relative">
              <div class="bg-gradient-to-br ${a.image_color} h-44 flex items-center justify-center overflow-hidden">
                ${a.image_url
                  ? `<img src="${a.image_url}" alt="${a.title}" class="w-full h-full object-cover">`
                  : `<div class="text-center"><div class="text-5xl mb-1">${a.image_emoji}</div><div class="text-white text-xs opacity-70">${a.producer}</div></div>`}
              </div>
              ${winemarkBadge}
              ${timerHtml}
              ${user ? watchBtn : ''}
            </div>
            <div class="p-3">
              <p class="text-xs text-gray-500 mb-1">${a.producer}</p>
              <p class="font-medium text-gray-900 text-sm leading-snug mb-2 line-clamp-2">${a.title}</p>
              <div class="flex flex-wrap gap-1 mb-2">
                ${a.vintage ? `<span class="tag-vintage text-xs px-2 py-0.5 rounded-full">${a.vintage}</span>` : ''}
                ${a.region ? `<span class="tag-region text-xs px-2 py-0.5 rounded-full">${a.region.split('/').pop().trim()}</span>` : ''}
              </div>
              <div class="flex items-end justify-between">
                <div>
                  <p class="text-xs text-gray-400">現在の価格</p>
                  <p class="text-lg font-bold text-gray-900 auction-price">¥${a.current_price.toLocaleString()}</p>
                </div>
                <p class="text-xs text-gray-400 auction-bid-count">入札 ${a.bid_count}件</p>
              </div>
            </div>
          </a>`;
      }).join('');

      // タイマー開始（終了間近のみ）
      document.querySelectorAll('.timer-label').forEach(el => {
        const endTime = new Date(el.dataset.end);
        const id = setInterval(() => {
          const diff = endTime - new Date();
          if (diff <= 0) { el.textContent = '終了'; clearInterval(id); return; }
          el.textContent = '残り ' + formatCountdown(diff);
        }, 1000);
        timers[el.dataset.end] = id;
        // 即時表示
        const diff = endTime - new Date();
        if (diff > 0) el.textContent = '残り ' + formatCountdown(diff);
      });
    }

    async function toggleWatch(e, auctionId, btn) {
      e.preventDefault();
      e.stopPropagation();
      if (!token) { location.href = '/login'; return; }
      try {
        const res = await fetch(`/api/auctions/${auctionId}/watch`, {
          method: 'POST', headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        btn.textContent = data.watched ? '❤️' : '🤍';
        btn.className = data.watched
          ? 'absolute top-2 right-2 text-red-400 bg-white rounded-full p-1 shadow'
          : 'absolute top-2 right-2 text-gray-300 bg-white rounded-full p-1 shadow hover:text-red-400';
      } catch(e) {}
    }

    function formatCountdown(ms) {
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      return `${m}:${String(s).padStart(2,'0')}`;
    }

    function formatTimeShort(ms) {
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      if (h > 0) return `${h}時間${m}分`;
      return `${m}分`;
    }

    // 検索エンター
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') applyFilters();
    });
    document.getElementById('searchInputMobile').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') applyFilters(true);
    });

    // 初期ロード
    loadAuctions();
  </script>
</body>
</html>
